<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobReadyCV</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="css-carpeta/display.css">

    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="display-flex space-bet ali-center">
        <a href=""><img src="img/index-img/transparent-logo.png" alt="" id="logo"></a>

        <span id="user-info">
            Hola <a href="sub-pagina/login.html">iniciar sessió</a>!
        </span>

        <div class="display-flex space-bet container-list-button">
            <ul class="display-flex gap-50">
                <li><a href="">Inici</a></li>
                <li><a href="">Revisar</a></li>
                <li><a href="">Entrevista</a></li>
                <li><a href="">Contacte</a></li>
                <li><a href="">Premium</a></li>
            </ul>

            <div class="display-flex gap-10">
                <button class="but-login"><a href="sub-pagina/login.html">Iniciar</a></button>
                <button class="but-iniciar"><a href="">Crear</a></button>
            </div>
        </div>
    </nav>

    <main>
        
    </main>

    <footer></footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>

    <script>
        async function loadUser() {
            const userInfo = document.getElementById("user-info")

            const { data: { session } } = await client.auth.getSession()

            if (!session) {
                userInfo.innerHTML = `
                    Hola <a href="sub-pagina/login.html">iniciar sessió</a>!
                `
                return
            }

            const user = session.user

            const { data: profile } = await client
                .from('profiles')
                .select('username')
                .eq('id', user.id)
                .maybeSingle()

            const name = profile?.username

            userInfo.innerHTML = `
                <a href="sub-pagina/userprofile.html">Hola ${name}</a>
            `
        }

        loadUser()
    </script>
</body>
</html>
