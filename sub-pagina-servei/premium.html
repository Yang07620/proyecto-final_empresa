<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium</title>
    <link rel="stylesheet" href="../index.css">
    <link rel="stylesheet" href="../css-carpeta/premium.css">
    <link rel="stylesheet" href="../css-carpeta/display.css">

    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="display-flex space-bet ali-center">
        <a href=""><img src="../img/index-img/transparent-logo.png" alt="" id="logo"></a>

        <span id="user-info" class="Rubik-F">
            Hola <a href="sub-pagina/login.html">iniciar sessió</a>!
        </span>

        <div class="display-flex space-bet container-list-button">
            <ul class="display-flex gap-50">
                <li><a href="">Inici</a></li>
                <li><a href="">Revisar</a></li>
                <li><a href="">Entrevista</a></li>
                <li><a href="">Contacte</a></li>
                <li><a href="premium.html">Premium</a></li>
            </ul>

            <div class="display-flex gap-10">
                <button class="but-login"><a href="../sub-pagina/login.html">Iniciar</a></button>
                <button class="but-iniciar"><a href="">Crear</a></button>
            </div>
        </div>
    </nav>

    <main>
        <h1>Transformant coneixement en impacte real i resultats mesurables.</h1>

        <button>Crear el meu CV</button>

        <div class="display-flex gap-20">
            <div class="menu-setmana">
                <p class="titol-menu Inter-F">PLA SETMANAL</p>

                <div>
                    <span class="preu-text Rubik-F">15.99€</span>
                    <span class="Inter-F frase-1">Durant 7 dies</span>
                </div>
            </div>

            <div class="menu-mensual">
                <p class="titol-menu Inter-F">PLA MENSUAL</p>
                <div>
                    <span class="preu-text Rubik-F">35.99€</span>
                    <span class="Inter-F frase-1">Durant 30 dies</span>
                </div>
            </div>

            <div class="menu-anual">
                <p class="titol-menu Inter-F">PLA ANUAL</p>
                <div>
                    <span class="preu-text Rubik-F">259.99€</span>
                    <span class="Inter-F frase-1">Durant 365 dies</span>
                </div>
            </div>
        </div>
    </main>

    <footer></footer>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase.js"></script>
    <script src="../auth.js"></script>

    <script>
        async function checkUser() {
            const userInfo = document.getElementById("user-info")

            const user = await getUserProfile()

            if (!user) {
                userInfo.innerHTML = `
                    Hola <a href="sub-pagina/login.html">iniciar sessió</a>!
                `
                return
            }

            if (!user.username) {
                window.location.href = "sub-pagina/registrar2.html"
                return
            }

            userInfo.innerHTML = `
                Hola <a href="sub-pagina/userprofile.html">${user.username}</a>!
            `
        }

        // 👇 SOLO UNA VEZ Y AL FINAL
        checkUser()
    </script>
</body>
</html>
