<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar</title>
    <link rel="stylesheet" href="../css-carpeta/login.css">
    <link rel="stylesheet" href="../css-carpeta/display.css">

    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
</head>
<body>
    <a href="login.html">
        <img src="../img/img-login/chevron-a-la-izquierda (1).png" alt="" class="volver-img">
    </a>
    <div class="display-flex ali-center just-center container-form">
        <div class="panel-login-re display-flex column ali-center just-center gap-20">
            <h2>Benvinguts al Job<span class="ready">Ready</span><span class="cv">CV</span></h2>
            <span class="Inter-F color-gris">El teu nom</span>
            <form action="" class="display-flex column gap-30 ali-center">
                <div class="display-flex column gap-20">
                    <div class="button-proveidor display-flex ali-center just-center gap-10">
                        <label for="nom-user">
                            <img src="../img/img-login/editar.png" alt="" class="pad-4">
                        </label>
                        <input type="text" id="nom-user" placeholder="Nom d'usuari" class="Inter-F input-box">
                    </div>
                <button type="button" class="btn-sessio" onclick="guardarUsername()">
                    Crear
                </button>
            </form>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="../supabase.js"></script>
    <script>
        async function guardarUsername() {
            const username = document.getElementById("nom-user").value.trim()

            if (!username) {
                alert("Es obligatorio poner username")
                return
            }

            const { data: { session } } = await client.auth.getSession()

            if (!session) {
                alert("No hay sesión activa")
                window.location.href = "login.html"
                return
            }

            const user = session.user

            // comprobar si ya existe perfil
            const { data: existing, error: checkError } = await client
                .from("profiles")
                .select("id")
                .eq("id", user.id)
                .maybeSingle()

            if (checkError) {
                alert(checkError.message)
                return
            }

            if (existing) {
                alert("Ya tienes perfil creado")
                window.location.href = "../index.html"
                return
            }

            // crear perfil
            const { error } = await client
                .from("profiles")
                .insert({
                    id: user.id,
                    username: username
                })

            if (error) {
                alert(error.message)
                return
            }

            window.location.href = "../index.html"
        }
    </script>
</body>
</html>
