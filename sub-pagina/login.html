<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sessió</title>
    <link rel="stylesheet" href="../css-carpeta/login.css">
    <link rel="stylesheet" href="../css-carpeta/display.css">

    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
</head>
<body class="display-flex ali-center just-center">
    <div class="panel-login display-flex column ali-center just-center gap-20">
        <h2>Benvinguts al Job<span class="ready">Ready</span><span class="cv">CV</span></h2>

        <span class="Inter-F color-gris pad-10-right">Iniciar ràpida</span>

        <div class="button-login-menu display-flex ali-center column space-bet">
            <!-- Login amb Github (Supabase) -->
            <button onclick="login()" class="button-proveidor display-flex ali-center just-center gap-20">
                <img src="../img/img-login/github.png" alt="" id="logo-github-login"><span class="mida-text">Continuar amb GitHub</span>
            </button>

            <!-- Login amb Discord (Supabase) -->
            <button onclick="loginDiscord()" class="button-proveidor display-flex ali-center just-center gap-20">
                <img src="../img/img-login/discordia.png" alt=""><span class="mida-text">Continuar amb Discord</span>
            </button>

            <!-- Login amb X (Supabase) -->
            <button onclick="loginX()"class="button-proveidor display-flex ali-center just-center gap-20">
                <img src="../img/img-login/gorjeo (1).png" alt=""><span class="mida-text">Continuar amb X</span>
            </button>
        </div>
        
        <span class="Inter-F color-gris">Amb una compte</span>

        <form action="" class="display-flex column gap-30 ali-center">
            <div class="display-flex column gap-20">
                <div class="button-proveidor display-flex ali-center just-center gap-10">
                    <label for="user-mail">
                        <img src="../img/img-login/correo.png" alt="" class="pad-4">
                    </label>
                    <input type="email" class="Inter-F input-box" placeholder="Adreça de correu electrònic" id="user-mail">
                </div>

                <div class="button-proveidor display-flex ali-center just-center gap-10">
                    <label for="user-pass">
                        <img src="../img/img-login/ojo-cerrado.png" alt="" class="pad-4">
                    </label>
                    <input type="password" class="Inter-F input-box" placeholder="Contrasenya" id="user-pass">
                </div>
            </div>

            <div class="container-link Inter-F display-flex gap-20">
                <a href="../sub-pagina/registrar.html">Registrar</a>
                <a href="">Oblidar la contrasenya</a>
            </div>

            <button type="button" onclick="loginEmail()" class="btn-sessio">Iniciar sessió</button>
        </form>
    </div>


    <!-- Vinculació a supabase-->
     
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="../supabase.js"></script>
    <script>

        async function login() {
            const { data, error } = await client.auth.signInWithOAuth({
                provider: 'github',
                options: {
                    redirectTo: window.location.origin + "/index.html"
                }
            })

            if (error) console.log(error)
        }

        async function loginDiscord() {
            const { data, error } = await client.auth.signInWithOAuth({
                provider: 'discord',
                options: {
                    redirectTo: window.location.origin + "/index.html"
                }
            })

            if (error) console.log(error)
        }

        async function loginX() {
            const { data, error } = await client.auth.signInWithOAuth({
                provider: 'x',
                options: {
                    redirectTo: window.location.origin + "/index.html"
                }
            })

            if (error) console.log(error)
        }

        async function loginEmail() {
            const email = document.querySelector('input[type="email"]').value
            const password = document.querySelector('input[type="password"]').value

            const { data, error } = await client.auth.signInWithPassword({
                email: email,
                password: password
            })

            if (error) {
                alert("Error: " + error.message)
            } else {
                window.location.href = "../index.html"
            }
        }
    </script>
</body>
</html>
